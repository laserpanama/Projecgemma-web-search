<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
    <script>
        window['ai_edge_gallery_get_result'] = async (data, secret) => {
            try {
                const { query } = JSON.parse(data);
                if (!query) throw new Error("Query vacía");

                const response = await fetch("https://google.serper.dev/search", {
                    method: "POST",
                    headers: {
                        "X-API-KEY": secret,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ 
                        q: query,
                        num: 5, // Limitamos a 5 para no saturar el contexto de la IA
                        gl: "es" // Preferencia de resultados en español
                    })
                });

                const result = await response.json();
                
                // Si no hay resultados orgánicos, avisamos
                if (!result.organic || result.organic.length === 0) {
                    return JSON.stringify({ result: "No se encontraron resultados relevantes." });
                }

                // Limpieza de datos: Solo enviamos lo que aporta valor
                const cleanResults = result.organic.map(item => {
                    return `Fuente: ${item.title}\nSnippet: ${item.snippet}\nLink: ${item.link}`;
                }).join("\n\n---\n\n");

                return JSON.stringify({
                    result: "Resultados encontrados:\n\n" + cleanResults
                });

            } catch (e) {
                // Error amigable para el log de la Edge Gallery
                return JSON.stringify({ error: `Error en Skill: ${e.message}` });
            }
        };
    </script>
</body>
</html>
